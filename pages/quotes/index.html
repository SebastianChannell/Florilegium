<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotes | Florilegium</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="../../css/dashboard-tuning.css" />
</head>
<body>
  <nav class="side-menu" aria-label="Main navigation">
    <button class="menu-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="siteMenu">
      <span class="menu-toggle__bar"></span>
      <span class="menu-toggle__bar"></span>
      <span class="menu-toggle__bar"></span>
    </button>

    <div class="menu-panel" id="siteMenu" aria-hidden="true">
      <div class="menu-panel__header">
        <p class="menu-panel__eyebrow">Navigation</p>
        <button class="menu-close" type="button" aria-label="Close navigation menu">&times;</button>
      </div>
      <details class="menu-group" open>
        <summary class="menu-summary">Hodie</summary>
        <div class="menu-submenu">
          <a href="../readings/" class="menu-link menu-link--sub">Propers</a>
          <a href="../ordo/" class="menu-link menu-link--sub">Ordo</a>
        </div>
      </details>
      <details class="menu-group" open>
        <summary class="menu-summary">Citationes</summary>
        <div class="menu-submenu">
          <a href="#search" class="menu-link menu-link--sub">Search Quote</a>
          <a href="#quotesGrid" class="menu-link menu-link--sub">All Quotes</a>
        </div>
      </details>
      <details class="menu-group" open>
        <summary class="menu-summary">Supplementa</summary>
        <div class="menu-submenu">
          <a href="../miniature-lives/" class="menu-link menu-link--sub">Fr. Bowden’s Saints Lives</a>
        </div>
      </details>
      <a href="https://github.com/SebastianChannell/Florilegium" class="menu-link">Project source</a>
    </div>
    <button class="menu-backdrop" type="button" tabindex="-1" aria-label="Close navigation menu"></button>
  </nav>

  <div class="page-shell page-shell--detail">
    <header class="site-header">
      <div class="brand-row">
        <a class="brand-mark" href="../../" aria-label="Florilegium home">
          <img src="../../assests/florilegium-logo.svg" alt="" />
        </a>
        <p class="eyebrow">SACRUM FLORILEGIUM</p>
      </div>
      <div class="heading-copy">
       <h1>Florilegium</h1>
        <p class="subtitle">Gathered flowers from Scripture, saints, and sacred writers.</p>
      </div>
    </header>

    <main>
      <section class="controls-panel" aria-label="Quote search and filters">
        <div class="control-group">
          <label for="search">Search quotes, author, source, tags</label>
          <input id="search" type="search" placeholder="Search quiet texts…" autocomplete="off" />
        </div>

        <div class="filter-row">
          <div class="control-group">
            <label for="authorFilter">Filter by author</label>
            <select id="authorFilter">
              <option value="">All authors</option>
            </select>
          </div>

          <div class="control-group">
            <label for="tagFilter">Filter by tag</label>
            <select id="tagFilter">
              <option value="">All tags</option>
            </select>
          </div>
        </div>
      </section>

      <section class="quotes-grid" id="quotesGrid" aria-live="polite" aria-label="Quote list">
      </section>

      <div class="empty-state hidden" id="emptyState">
        <p>Nothing matches your search. Try another word, author, or tag.</p>
      </div>
    </main>
  </div>

  <script type="module" src="../../js/app.js"></script>
</body>
</html>
