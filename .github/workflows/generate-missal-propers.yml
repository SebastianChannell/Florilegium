name: Generate Missal Propers

on:
  workflow_dispatch:
    inputs:
      divinum_ref:
        description: Divinum Officium branch, tag, or commit to use
        required: false
        default: master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Sacrum Florilegium
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Perl CGI dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libcgi-pm-perl

      - name: Clone Divinum Officium
        run: |
          git clone --depth=1 --branch "${{ inputs.divinum_ref }}" https://github.com/DivinumOfficium/divinum-officium.git ../divinum-officium

      - name: Generate local propers JSON
        run: |
          DIVINUM_OFFICIUM_PATH=../divinum-officium npm run build:missal-propers
          cp data/missal/1962/proper-map-2026.generated.json data/missal/1962/proper-map-2026.json

      - name: Show generated diff
        run: |
          git diff -- data/missal/1962/propers-en.json data/missal/1962/proper-map-2026.json data/missal/1962/proper-map-2026.generated.json

      - name: Commit generated propers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/missal/1962/propers-en.json data/missal/1962/proper-map-2026.json data/missal/1962/proper-map-2026.generated.json
          if git diff --staged --quiet; then
            echo "No generated propers changes to commit."
          else
            git commit -m "Regenerate missal propers"
            git push
          fi
